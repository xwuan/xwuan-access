<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Access — xwuan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080e1a;
    --card: #0d1628;
    --card2: #111e35;
    --border: rgba(0,220,255,0.12);
    --cyan: #00dcff;
    --cyan2: #0af;
    --green: #00ffb3;
    --muted: rgba(0,220,255,0.35);
    --text: #cce8ff;
    --dim: rgba(180,210,255,0.45);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    font-family: 'Syne', sans-serif;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,180,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,180,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
    opacity: 0.25;
  }
  .blob-1 { width:400px; height:400px; background: radial-gradient(circle, #0044ff, transparent); top:-100px; left:-100px; }
  .blob-2 { width:350px; height:350px; background: radial-gradient(circle, #00aaff, transparent); bottom:-80px; right:-80px; }

  header {
    position: relative; z-index: 1;
    text-align: center;
    padding: 52px 20px 28px;
  }

  .site-tag {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.35em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  header h1 {
    font-size: clamp(26px, 5vw, 42px);
    font-weight: 800;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #fff 0%, var(--cyan) 60%, #0066ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }

  header p {
    font-size: 13px;
    color: var(--dim);
    margin-top: 10px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.05em;
  }

  .live-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    margin-right: 6px;
    vertical-align: middle;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; box-shadow: 0 0 0 0 rgba(0,255,179,0.5); }
    50% { opacity:0.7; box-shadow: 0 0 0 6px rgba(0,255,179,0); }
  }

  .cards-wrapper {
    position: relative; z-index: 1;
    width: 100%; max-width: 480px;
    padding: 0 16px 60px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .account-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px 24px 24px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s ease, border-color 0.2s ease;
    animation: fadeUp 0.5s ease both;
  }
  .account-card:nth-child(1) { animation-delay: 0.05s; }
  .account-card:nth-child(2) { animation-delay: 0.15s; }
  .account-card:nth-child(3) { animation-delay: 0.25s; }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(20px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .account-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0.5;
  }

  .account-card:hover {
    transform: translateY(-2px);
    border-color: rgba(0,220,255,0.25);
  }

  .card-slot {
    position: absolute;
    top: 14px; right: 18px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.2em;
  }

  .card-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .account-email {
    font-family: 'Space Mono', monospace;
    font-size: clamp(14px, 3.5vw, 17px);
    color: var(--cyan);
    font-weight: 700;
    margin-bottom: 20px;
    word-break: break-all;
    letter-spacing: 0.02em;
  }

  .account-email .mask-stars {
    color: rgba(0,180,255,0.5);
    letter-spacing: -0.05em;
  }

  .btn-row {
    display: flex;
    gap: 10px;
  }

  .btn-copy {
    flex: 1;
    padding: 13px 10px;
    border: none;
    border-radius: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.18s ease;
    position: relative;
    overflow: hidden;
  }

  .btn-copy::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.1);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .btn-copy:hover::after { opacity: 1; }
  .btn-copy:active { transform: scale(0.97); }

  .btn-id {
    background: linear-gradient(135deg, #00ccff, #0088ff);
    color: #001828;
  }

  .btn-pass {
    background: linear-gradient(135deg, #00ffb3, #00bbff);
    color: #001828;
  }

  .btn-copy.copied {
    background: linear-gradient(135deg, #00ff99, #00cc77) !important;
  }

  .copy-icon {
    display: inline-block;
    margin-right: 5px;
    vertical-align: -1px;
  }

  .divider {
    width: 1px;
    background: var(--border);
    align-self: stretch;
    flex-shrink: 0;
  }

  /* Skeleton loading */
  .skeleton .account-email,
  .skeleton .btn-copy {
    background: linear-gradient(90deg, #0d1628 25%, #152040 50%, #0d1628 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 6px;
    color: transparent;
  }
  .skeleton .account-email { height: 22px; width: 80%; }
  .skeleton .btn-copy { pointer-events: none; }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #0d2a1a;
    border: 1px solid var(--green);
    color: var(--green);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 12px 24px;
    border-radius: 40px;
    letter-spacing: 0.1em;
    z-index: 999;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Admin link */
  .admin-link {
    position: fixed;
    bottom: 20px; right: 20px;
    z-index: 10;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: rgba(0,180,255,0.2);
    text-decoration: none;
    letter-spacing: 0.1em;
    transition: color 0.2s;
  }
  .admin-link:hover { color: var(--cyan); }

  /* Empty state */
  .empty-card {
    background: var(--card);
    border: 1px dashed var(--border);
    border-radius: 18px;
    padding: 40px 24px;
    text-align: center;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
  }

  footer {
    position: relative; z-index: 1;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: rgba(0,150,200,0.2);
    padding-bottom: 24px;
    text-align: center;
  }

  @media (max-width: 400px) {
    .account-card { padding: 22px 18px 18px; }
    .btn-copy { font-size: 10px; padding: 12px 8px; }
  }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<header>
  <div class="site-tag">● xwuan.com / access</div>
  <h1>Secure Access</h1>
  <p><span class="live-dot"></span>ENCRYPTED · REAL-TIME SYNC</p>
</header>

<div class="cards-wrapper" id="cardsContainer">
  <!-- Cards rendered by JS -->
  <div class="empty-card" id="loadingMsg">
    <div style="margin-bottom:8px;font-size:18px">⌛</div>
    ĐANG TẢI DỮ LIỆU...
  </div>
</div>

<footer>© XWUAN SECURE SYSTEM</footer>

<a href="admin.html" class="admin-link">⚙ admin</a>

<div class="toast" id="toast">✓ ĐÃ SAO CHÉP</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ═══════════════════════════════════════════════
  // 🔧 THAY THẾ BẰNG CONFIG FIREBASE CỦA BẠN
  // ═══════════════════════════════════════════════
  const firebaseConfig = {
    apiKey: "AIzaSyB3FSIkvSXob6F7MXrfOpw_hN6wHKIbu38",
    authDomain: "xwuan-access-e9d5e.firebaseapp.com",
    databaseURL: "https://xwuan-access-e9d5e-default-rtdb.firebaseio.com",
    projectId: "xwuan-access-e9d5e",
    storageBucket: "xwuan-access-e9d5e.firebasestorage.app",
    messagingSenderId: "941977010861",
    appId: "1:941977010861:web:8edc6af5dddccf4097fc24"
  };
  // ═══════════════════════════════════════════════

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const container = document.getElementById('cardsContainer');
  const loadingMsg = document.getElementById('loadingMsg');

  function maskEmail(email) {
    if (!email) return '';
    const [local, domain] = email.split('@');
    if (!local || !domain) return email;
    const visible = local.slice(0, 4);
    const stars = '*'.repeat(Math.max(3, local.length - 4));
    return `${visible}<span class="mask-stars">${stars}</span>@xwuan.com`;
  }

  function createCard(slot, data) {
    if (!data || !data.email) return null;

    const card = document.createElement('div');
    card.className = 'account-card';
    card.innerHTML = `
      <div class="card-slot">SLOT ${slot}</div>
      <div class="card-label">Account</div>
      <div class="account-email">${maskEmail(data.email)}</div>
      <div class="btn-row">
        <button class="btn-copy btn-id" onclick="copyText('${data.email}', this, 'ID đã sao chép!')">
          <span class="copy-icon">⧉</span> SAO CHÉP ID
        </button>
        <div class="divider"></div>
        <button class="btn-copy btn-pass" onclick="copyText('${data.password || ''}', this, 'Pass đã sao chép!')">
          <span class="copy-icon">⧉</span> SAO CHÉP PASS
        </button>
      </div>
    `;
    return card;
  }

  // Listen to all 3 slots in real-time
  const accountsRef = ref(db, 'accounts');
  onValue(accountsRef, (snapshot) => {
    loadingMsg.style.display = 'none';

    // Remove old cards
    container.querySelectorAll('.account-card, .empty-card').forEach(el => el.remove());

    const data = snapshot.val() || {};
    let hasAny = false;

    for (let i = 1; i <= 3; i++) {
      const slotData = data[`slot${i}`];
      if (slotData && slotData.email) {
        const card = createCard(i, slotData);
        if (card) { container.appendChild(card); hasAny = true; }
      } else {
        const empty = document.createElement('div');
        empty.className = 'empty-card';
        empty.innerHTML = `<div style="font-size:16px;margin-bottom:6px">🔒</div>SLOT ${i} — CHƯA CÓ TÀI KHOẢN`;
        container.appendChild(empty);
      }
    }
  });
</script>

<script>
  function copyText(text, btn, msg) {
    if (!text) { showToast('⚠ Không có dữ liệu!'); return; }
    navigator.clipboard.writeText(text).then(() => {
      const orig = btn.innerHTML;
      btn.innerHTML = '✓ ĐÃ SAO CHÉP';
      btn.classList.add('copied');
      showToast(msg);
      setTimeout(() => {
        btn.innerHTML = orig;
        btn.classList.remove('copied');
      }, 2000);
    }).catch(() => {
      // Fallback for older browsers
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
      showToast(msg);
    });
  }

  let toastTimer;
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
  }
</script>
</body>
</html>
